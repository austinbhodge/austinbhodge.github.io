<section class="min-h-screen flex items-center justify-center py-20 relative">
  <!-- Background decoration -->
  <div class="absolute inset-0 bg-gradient-to-br from-emerald-50 via-transparent to-forest-50 opacity-50"></div>
  
  <div class="container max-w-screen-xl mx-auto px-4 relative z-10">
    <div class="max-w-2xl mx-auto">
      <!-- Header -->
      <div class="text-center mb-12 animate-fade-in">
        <h1 class="font-display text-forest-900 text-4xl md:text-5xl font-bold mb-4">Get In Touch</h1>
        <p class="text-forest-600 text-lg">Have a project in mind? Let's work together to bring your ideas to life.</p>
      </div>

      <!-- Contact Form Card -->
      <div class="bg-white rounded-2xl shadow-2xl overflow-hidden animate-slide-up">
        <!-- Card Header with gradient -->
        <div class="bg-gradient-to-r from-emerald-500 to-forest-600 p-8">
          <div class="flex items-center justify-center space-x-3">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <h2 class="text-white text-2xl font-semibold">Send Me a Message</h2>
          </div>
        </div>

        <!-- Form -->
        <form class="p-8 space-y-6">
          <!-- Name Input -->
          <div class="group">
            <label for="name" class="block text-forest-700 font-medium mb-2">
              Your Name
            </label>
            <div class="relative">
              <input
                id="name"
                type="text"
                placeholder="John Doe"
                class="w-full px-4 py-3 bg-sage-50 border-2 border-transparent rounded-lg focus:outline-none focus:border-emerald-500 focus:bg-white transition-all duration-200 placeholder-forest-400"
              />
              <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-forest-400 group-focus-within:text-emerald-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
              </div>
            </div>
          </div>

          <!-- Email Input -->
          <div class="group">
            <label for="email" class="block text-forest-700 font-medium mb-2">
              Email Address
            </label>
            <div class="relative">
              <input
                id="email"
                type="email"
                placeholder="john.doe@example.com"
                class="w-full px-4 py-3 bg-sage-50 border-2 border-transparent rounded-lg focus:outline-none focus:border-emerald-500 focus:bg-white transition-all duration-200 placeholder-forest-400"
              />
              <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-forest-400 group-focus-within:text-emerald-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
              </div>
            </div>
          </div>

          <!-- Subject Input -->
          <div class="group">
            <label for="subject" class="block text-forest-700 font-medium mb-2">
              Subject
            </label>
            <div class="relative">
              <input
                id="subject"
                type="text"
                placeholder="Project Inquiry"
                class="w-full px-4 py-3 bg-sage-50 border-2 border-transparent rounded-lg focus:outline-none focus:border-emerald-500 focus:bg-white transition-all duration-200 placeholder-forest-400"
              />
              <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-forest-400 group-focus-within:text-emerald-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"/>
                </svg>
              </div>
            </div>
          </div>

          <!-- Message Textarea -->
          <div class="group">
            <label for="message" class="block text-forest-700 font-medium mb-2">
              Your Message
            </label>
            <textarea
              id="message"
              rows="5"
              placeholder="Tell me about your project..."
              class="w-full px-4 py-3 bg-sage-50 border-2 border-transparent rounded-lg focus:outline-none focus:border-emerald-500 focus:bg-white transition-all duration-200 placeholder-forest-400 resize-none"
            ></textarea>
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            class="w-full py-4 bg-gradient-to-r from-emerald-500 to-forest-600 text-white font-semibold rounded-lg hover:from-emerald-600 hover:to-forest-700 transform hover:-translate-y-0.5 transition-all duration-200 shadow-lg hover:shadow-xl flex items-center justify-center group"
          >
            <span>Send Message</span>
            <svg class="w-5 h-5 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
            </svg>
          </button>
        </form>
      </div>

      <!-- Alternative Contact Methods -->
      <div class="mt-12 text-center animate-fade-in">
        <p class="text-forest-600 mb-6">Or reach out directly via:</p>
        <div class="flex justify-center space-x-6">
          <a href="mailto:austinbhodge@gmail.com" 
             class="group flex items-center space-x-2 text-forest-700 hover:text-emerald-600 transition-colors">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
              <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
              <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
            </svg>
            <span class="font-medium group-hover:underline">austinbhodge&#64;gmail.com</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
